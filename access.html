<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクセス | KHS協同組合</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        en: ['"Montserrat"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#0F3B66',
                            gold: '#F2B705',
                            light: '#F5F9FF',
                            gray: '#475569',
                            border: '#E2E8F0'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background-color: white; color: #003366; line-height: 2.0; }
        h1, h2, h3 { font-weight: 800; letter-spacing: -0.04em; line-height: 1.2; }
        .layout-main { max-width: 80rem; margin-left: auto; margin-right: auto; padding-left: 2rem; padding-right: 2rem; }
        @media (min-width: 768px) { .layout-main { padding-left: 3rem; padding-right: 3rem; } }
        @media (min-width: 1024px) { .layout-main { padding-left: 5rem; padding-right: 5rem; } }
        .section-macro { padding-top: 6rem; padding-bottom: 6rem; }
        @media (min-width: 768px) { .section-macro { padding-top: 10rem; padding-bottom: 10rem; } }
        @media (min-width: 768px) { .section-macro { padding-top: 8rem; padding-bottom: 8rem; } }
        .reveal {
            opacity: 0; transform: translateY(40px);
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .reveal.is-visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="overflow-x-hidden font-sans">

    <!-- Header (Consistent) -->
    <div id="app-header"></div>

    <!-- Page Hero -->
    <section class="pt-40 pb-20 bg-brand-navy flex items-end border-b border-brand-navy/10 text-white">
        <div class="layout-main w-full">
            <div class="reveal">
                <div class="text-brand-gold text-xs font-black mb-6 uppercase tracking-[0.5em]">Our Location</div>
                <h1 class="text-4xl md:text-6xl font-black mb-8">アクセス</h1>
                <div class="h-1 bg-brand-gold w-24"></div>
            </div>
        </div>
    </section>

    <!-- 2カラムレイアウト開始 -->
    <div class="bg-brand-light py-12 lg:py-20 border-y border-brand-border relative">
        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: repeating-linear-gradient(45deg, #003366 0, #003366 1px, transparent 1px, transparent 10px);"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col lg:flex-row gap-10 relative z-10">
            <!-- 左サイドバー -->
            <aside id="app-sidebar" class="hidden lg:block w-full lg:w-[280px] shrink-0"></aside>
            <main class="flex-1 space-y-12">

    <!-- Google Map Container -->
    <section class="bg-white rounded-2xl border border-brand-border shadow-sm p-6 sm:p-10 fade-up">
        <div class="reveal">
            <div class="w-full h-[500px] md:h-[700px] bg-brand-navy/5 overflow-hidden border border-brand-navy/10 mb-24 grayscale brightness-90 contrast-110 rounded-xl">
                <!-- プレースホルダーマップ（実際にはGoogle Map埋め込みコードを配置） -->
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3240.8280303808788!2d139.76493611525882!3d35.68123618019432!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188bfbd89f710f%3A0xbdc7a29ec60b1382!2z5p2x5Lqs6aeF!5e0!3m2!1sja!2sjp!4v1600000000000!5m2!1sja!2sjp" width="100%" height="100%" frameborder="0" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
            </div>

            <div class="grid lg:grid-cols-2 gap-24">
                <div>
                    <h2 class="text-2xl font-black mb-12 uppercase tracking-widest border-b-4 border-brand-navy inline-block">Head Office</h2>
                    <div class="space-y-12">
                        <div>
                            <span class="text-brand-gold text-xs font-black tracking-widest block mb-4 uppercase">Address</span>
                            <p class="text-2xl font-black">〒100-0005<br>東京都千代田区丸の内1-2-3<br>丸の内ビジネスセンターF棟 12階</p>
                        </div>
                        <div>
                            <span class="text-brand-gold text-xs font-black tracking-widest block mb-4 uppercase">Transport</span>
                            <p class="text-lg text-brand-navy/60 font-bold leading-loose">
                                JR「東京駅」丸の内北口より徒歩5分<br>
                                東京メトロ千代田線「大手町駅」直結（B3出口）
                            </p>
                        </div>
                    </div>
                </div>
                <div>
                    <h2 class="text-2xl font-black mb-12 uppercase tracking-widest border-b-4 border-brand-navy inline-block">Information</h2>
                    <div class="space-y-12">
                        <div>
                            <span class="text-brand-gold text-xs font-black tracking-widest block mb-4 uppercase">Business Hours</span>
                            <p class="text-lg text-brand-navy/60 font-bold">平日 09:00 - 18:00（土日祝・年末年始を除く）</p>
                        </div>
                        <div class="bg-brand-light border border-brand-border p-8 rounded-xl">
                            <p class="text-sm font-bold leading-loose text-brand-navy">ご来訪の際は、お手数ですが事前に担当者までご連絡をいただけますようお願い申し上げます。ビル1階の受付にて入館証の発行が必要となります。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

            </main>
        </div>
    </div>

    <!-- Footer -->
    <div id="app-footer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('is-visible');
                });
            }, { threshold: 0.1 });
            reveals.forEach(el => observer.observe(el));
        });
    </script>
    <!-- スマホ専用：画面下部固定CTA -->
    <div id="app-mobile-cta"></div>
    <script src="components.js"></script>
</body>
</html>
